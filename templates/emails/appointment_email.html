<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ subject }}</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        <tr>
            <td style="background-color: #198754; padding: 30px; text-align: center;">
                <h1 style="color: #ffffff; margin: 0; font-size: 24px; letter-spacing: 1px;">CareBridge Health</h1>
            </td>
        </tr>
        
        <tr>
            <td style="padding: 40px 30px;">
                <h2 style="color: #2c3e50; margin-top: 0;">Hi {{ name }},</h2>
                <p style="color: #555555; font-size: 16px; line-height: 1.6; margin-bottom: 25px;">
                    {{ message|safe }}
                </p>

                {% if action_url %}
                <div style="text-align: center; margin: 35px 0;">
                    <a href="{{ action_url }}" style="background-color: #0d6efd; color: #ffffff; padding: 14px 28px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 16px; display: inline-block;">
                        {{ action_text }}
                    </a>
                </div>
                {% endif %}
                
                <p style="color: #888888; font-size: 14px; line-height: 1.5; margin-top: 30px; border-top: 1px solid #eeeeee; padding-top: 20px;">
                    If you have any questions, please log into your CareBridge dashboard. <br>
                    Stay healthy,<br>
                    <strong>The VitalSync AI & CareBridge Team</strong>
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
