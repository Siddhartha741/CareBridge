{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 20px;">
                
                <div class="card-header p-4 text-white position-relative" 
                     style="background: linear-gradient(135deg, #009b4d 0%, #007a3d 100%);">
                    <div class="position-relative z-1">
                        <h4 class="fw-bold mb-1"><i class="fa-solid fa-calendar-check me-2"></i>Book Appointment</h4>
                        <p class="mb-0 opacity-75 small">Schedule a visit with our specialists.</p>
                    </div>
                    <div class="position-absolute top-0 end-0 bg-white opacity-10 rounded-circle" 
                         style="width: 150px; height: 150px; margin-top: -50px; margin-right: -50px;"></div>
                </div>
                
                <div class="card-body p-5">
                    <form method="POST" id="bookingForm">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small text-uppercase">
                                <i class="fa-solid fa-user-doctor me-1 text-success"></i> Select Specialist
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fa-solid fa-stethoscope text-muted"></i></span>
                                <select name="doctor" class="form-select form-select-lg bg-light border-0" required>
                                    <option value="" selected disabled>Choose a Specialist...</option>
                                    {% for doctor in doctors %}
                                        <option value="{{ doctor.id }}">
                                            Dr. {{ doctor.user.first_name }} {{ doctor.user.last_name }} — {{ doctor.specialization|default:doctor.department|title }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small text-uppercase">
                                <i class="fa-regular fa-calendar me-1 text-success"></i> Select Date
                            </label>
                            <input type="date" name="date" id="datePicker" class="form-control form-control-lg bg-light border-0" required>
                            <small class="text-muted" style="font-size: 0.8rem;">* Past dates are disabled automatically.</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small text-uppercase mb-3">
                                <i class="fa-regular fa-clock me-1 text-success"></i> Available Time Slots
                            </label>
                            
                            <input type="hidden" name="time" id="selectedTime" required>

                            <div class="row g-2">
                                <div class="col-12 text-muted small fw-bold mb-1">Morning</div>
                                <div class="col-4 col-md-3"><button type="button" class="btn btn-outline-success w-100 time-slot" data-value="09:00">09:00 AM</button></div>
                                <div class="col-4 col-md-3"><button type="button" class="btn btn-outline-success w-100 time-slot" data-value="10:00">10:00 AM</button></div>
                                <div class="col-4 col-md-3"><button type="button" class="btn btn-outline-success w-100 time-slot" data-value="11:00">11:00 AM</button></div>
                                
                                <div class="col-12 text-muted small fw-bold mb-1 mt-3">Afternoon</div>
                                <div class="col-4 col-md-3"><button type="button" class="btn btn-outline-success w-100 time-slot" data-value="13:00">01:00 PM</button></div>
                                <div class="col-4 col-md-3"><button type="button" class="btn btn-outline-success w-100 time-slot" data-value="14:00">02:00 PM</button></div>
                                <div class="col-4 col-md-3"><button type="button" class="btn btn-outline-success w-100 time-slot" data-value="15:00">03:00 PM</button></div>
                                <div class="col-4 col-md-3"><button type="button" class="btn btn-outline-success w-100 time-slot" data-value="16:00">04:00 PM</button></div>
                            </div>
                            <div id="timeError" class="text-danger small mt-2 d-none">Please select a time slot.</div>
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-bold text-secondary small text-uppercase">
                                <i class="fa-solid fa-notes-medical me-1 text-success"></i> Reason for Visit
                            </label>
                            <textarea name="reason" class="form-control bg-light border-0" rows="3" placeholder="Briefly describe your symptoms (e.g., fever, headache)..." required></textarea>
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <a href="{% url 'patient_dashboard' %}" class="btn btn-outline-secondary px-4 rounded-pill">Cancel</a>
                            <button type="submit" class="btn btn-primary px-5 py-2 shadow-sm rounded-pill fw-bold" id="confirmBtn">
                                Confirm Appointment
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 1. Block Past Dates
        const dateInput = document.getElementById('datePicker');
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);

        // 2. Handle Time Slot Selection
        const timeSlots = document.querySelectorAll('.time-slot');
        const hiddenTimeInput = document.getElementById('selectedTime');
        const timeError = document.getElementById('timeError');

        timeSlots.forEach(slot => {
            slot.addEventListener('click', function() {
                // Remove active class from all
                timeSlots.forEach(btn => {
                    btn.classList.remove('active', 'bg-success', 'text-white');
                    btn.classList.add('btn-outline-success');
                });

                // Add active class to clicked
                this.classList.remove('btn-outline-success');
                this.classList.add('active', 'bg-success', 'text-white');

                // Update hidden input
                hiddenTimeInput.value = this.getAttribute('data-value');
                timeError.classList.add('d-none');
            });
        });

        // 3. Form Validation on Submit
        const form = document.getElementById('bookingForm');
        form.addEventListener('submit', function(e) {
            if (!hiddenTimeInput.value) {
                e.preventDefault(); // Stop submission
                timeError.classList.remove('d-none'); // Show error
                // Scroll to time section
                hiddenTimeInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });
    });
</script>

<style>
    /* Smooth hover for time slots */
    .time-slot {
        transition: all 0.2s ease-in-out;
        font-weight: 500;
    }
    .time-slot:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 6px rgba(0, 155, 77, 0.2);
    }
    .form-control:focus, .form-select:focus {
        border: 2px solid #009b4d;
        box-shadow: none;
        background-color: #fff !important;
    }
</style>
{% endblock %}
