{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm" style="border-radius: 12px;">
                <div class="card-header bg-white p-4 border-bottom">
                    <h5 class="fw-bold mb-0 text-primary">
                        <i class="fa-solid fa-cloud-arrow-up me-2"></i>Upload Medical Report
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Select Patient</label>
                            {{ form.patient }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Report Title</label>
                            {{ form.title }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">File (PDF/Image)</label>
                            {{ form.file }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase">Description</label>
                            {{ form.description }}
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-bold py-2">Upload File</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
